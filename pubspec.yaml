name: jwsongbook
description: Kingdom Songs Lyrics App — word-by-word synced lyrics for all 154 JW Kingdom Songs.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Audio ────────────────────────────────────────────────────────────────
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # ── State management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Database (Drift / SQLite) ─────────────────────────────────────────────
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^14.3.0

  # ── Utilities ────────────────────────────────────────────────────────────
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.12
  drift_dev: ^2.20.2
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/lyrics/
    - assets/audio/

  # Fonts are loaded from the system (SF Pro on iOS, Roboto on Android).
  # If we add a custom font later, declare it here.
